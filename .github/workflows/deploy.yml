name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to commit KML back to repo
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Download fire perimeter data
        run: node scripts/fetch-fires.mjs
        continue-on-error: true

      - name: Download public lands boundaries
        run: node scripts/fetch-public-lands.mjs
        continue-on-error: true

      - name: Generate Google Maps KML (WADNR fires 2025)
        run: node scripts/generate-fire-kml.mjs
        continue-on-error: true

      - name: Commit KML to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f public/data/wadnr-fires-2025.kml 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update wadnr-fires-2025.kml [skip ci]"
          git push origin main || true
        continue-on-error: true

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
